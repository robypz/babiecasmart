<form class="space-y-6" (ngSubmit)="onSubmit($event)">
    <div class="space-y-2">
        <label class="font-label-md text-label-md text-on-surface" for="subject">Asunto</label>
        <input
            class="w-full bg-surface-soft border-0 border-b border-surface-container-highest focus:ring-2 focus:ring-primary-container focus:border-transparent rounded-lg p-4 transition-all"
            id="subject" name="subject" [(ngModel)]="subject" placeholder="¿En qué podemos ayudarte?" type="text" />
    </div>
    <button
        class="w-full md:w-auto bg-primary text-white px-12 py-4 rounded-full font-headline-md text-label-md font-bold level-2-shadow hover:scale-105 transition-all duration-300"
        type="submit">
        Enviar correo
    </button>
</form>
