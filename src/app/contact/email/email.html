<div class="lg:col-span-7 bg-white p-8 md:p-12 rounded-xl level-1-shadow border border-surface-container-high">
    <form class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="font-label-md text-label-md text-on-surface" for="name">Nombre
                    completo</label>
                <input
                    class="w-full bg-surface-soft border-0 border-b border-surface-container-highest focus:ring-2 focus:ring-primary-container focus:border-transparent rounded-lg p-4 transition-all"
                    id="name" name="name" placeholder="Juan Pérez" type="text" />
            </div>
            <div class="space-y-2">
                <label class="font-label-md text-label-md text-on-surface" for="email">Correo
                    electrónico</label>
                <input
                    class="w-full bg-surface-soft border-0 border-b border-surface-container-highest focus:ring-2 focus:ring-primary-container focus:border-transparent rounded-lg p-4 transition-all"
                    id="email" name="email" placeholder="juan@ejemplo.com" type="email" />
            </div>
        </div>
        <div class="space-y-2">
            <label class="font-label-md text-label-md text-on-surface" for="subject">Asunto</label>
            <input
                class="w-full bg-surface-soft border-0 border-b border-surface-container-highest focus:ring-2 focus:ring-primary-container focus:border-transparent rounded-lg p-4 transition-all"
                id="subject" name="subject" placeholder="¿En qué podemos ayudarte?" type="text" />
        </div>
        <div class="space-y-2">
            <label class="font-label-md text-label-md text-on-surface" for="message">Mensaje
                (body)</label>
            <textarea
                class="w-full bg-surface-soft border-0 border-b border-surface-container-highest focus:ring-2 focus:ring-primary-container focus:border-transparent rounded-lg p-4 transition-all"
                id="message" name="message" placeholder="Cuéntanos más sobre tu proyecto..." rows="5"></textarea>
        </div>
        <button
            class="w-full md:w-auto bg-primary-container text-white px-12 py-4 rounded-full font-headline-md text-label-md font-bold level-2-shadow hover:scale-105 transition-all duration-300"
            type="submit">
            Enviar mensaje
        </button>
    </form>
</div>
